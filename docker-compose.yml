# ============================================================
# ClawNook Docker Compose 配置
# 可选方式：docker compose up -d
# 推荐方式：使用 install.sh 一键安装
# ============================================================

services:
  clawnook:
    image: ghcr.io/cintia09/clawnook:latest
    container_name: clawnook
    hostname: openclaw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - KILL
      - DAC_OVERRIDE
      - FOWNER
      - SYS_CHROOT
      - AUDIT_WRITE
    volumes:
      - openclaw_state:/root/.openclaw
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - http_proxy=${http_proxy:-${HTTP_PROXY:-}}
      - HTTP_PROXY=${HTTP_PROXY:-${http_proxy:-}}
      - https_proxy=${https_proxy:-${HTTPS_PROXY:-}}
      - HTTPS_PROXY=${HTTPS_PROXY:-${https_proxy:-}}
      - no_proxy=${no_proxy:-${NO_PROXY:-}}
      - NO_PROXY=${NO_PROXY:-${no_proxy:-}}
    ports:
      - "${PORT_MAPPING:-18789:18789}"
      - "${WEB_PORT_MAPPING:-3000:3000}"
    restart: unless-stopped

volumes:
  openclaw_state:
