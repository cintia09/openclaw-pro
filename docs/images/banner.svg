<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.15" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f97316" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" rx="16" fill="url(#bg)"/>
  <rect width="800" height="260" rx="16" fill="url(#glow)"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="40" r="2" fill="#f9731640"/>
  <circle cx="740" cy="50" r="3" fill="#ef444440"/>
  <circle cx="120" cy="220" r="2.5" fill="#f9731630"/>
  <circle cx="680" cy="210" r="2" fill="#ef444430"/>
  <circle cx="200" cy="30" r="1.5" fill="#f9731620"/>
  <circle cx="600" cy="235" r="1.8" fill="#ef444420"/>

  <!-- Lobster cartoon character -->
  <g transform="translate(115, 130) scale(1.1)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="38" ry="28" fill="#ef4444" opacity="0.95"/>
    <ellipse cx="0" cy="5" rx="30" ry="18" fill="#f87171" opacity="0.6"/>

    <!-- Eyes -->
    <circle cx="-12" cy="-14" r="10" fill="white"/>
    <circle cx="12" cy="-14" r="10" fill="white"/>
    <circle cx="-10" cy="-15" r="5.5" fill="#1e293b"/>
    <circle cx="14" cy="-15" r="5.5" fill="#1e293b"/>
    <circle cx="-9" cy="-16.5" r="2" fill="white"/>
    <circle cx="15" cy="-16.5" r="2" fill="white"/>

    <!-- Eye stalks -->
    <rect x="-15" y="-28" width="6" height="10" rx="3" fill="#dc2626"/>
    <rect x="9" y="-28" width="6" height="10" rx="3" fill="#dc2626"/>

    <!-- Smile -->
    <path d="M-12,0 Q0,14 12,0" fill="none" stroke="#991b1b" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left claw -->
    <g transform="translate(-48, -8) rotate(-15)">
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ef4444"/>
      <path d="M10,-8 Q22,-16 18,-2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
      <path d="M10,8 Q22,16 18,2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    </g>

    <!-- Right claw -->
    <g transform="translate(48, -8) rotate(15)">
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ef4444"/>
      <path d="M-10,-8 Q-22,-16 -18,-2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
      <path d="M-10,8 Q-22,16 -18,2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    </g>

    <!-- Legs -->
    <line x1="-20" y1="20" x2="-32" y2="35" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="22" x2="-15" y2="38" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="15" y2="38" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="32" y2="35" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>

    <!-- Tail -->
    <path d="M0,26 Q-5,36 0,42 Q5,36 0,26" fill="#dc2626"/>
  </g>

  <!-- Title text -->
  <text x="400" y="85" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="white" filter="url(#shadow)">
    OpenClaw Pro
  </text>

  <!-- Tagline -->
  <text x="400" y="125" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#9ca3af" font-weight="400">
    你的私人 AI 助手，一键部署到任何平台
  </text>

  <!-- Feature pills -->
  <g transform="translate(400, 165)">
    <!-- One-click Install -->
    <rect x="-310" y="-14" width="105" height="28" rx="14" fill="#f9731620" stroke="#f97316" stroke-width="1" opacity="0.8"/>
    <text x="-257" y="5" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" fill="#f97316" font-weight="600">🚀 一键安装</text>

    <!-- Hot Update -->
    <rect x="-185" y="-14" width="105" height="28" rx="14" fill="#3b82f620" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
    <text x="-132" y="5" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" fill="#3b82f6" font-weight="600">🔄 热更新</text>

    <!-- Self-healing -->
    <rect x="-60" y="-14" width="120" height="28" rx="14" fill="#10b98120" stroke="#10b981" stroke-width="1" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" fill="#10b981" font-weight="600">🛡️ 自愈能力</text>

    <!-- Web Panel -->
    <rect x="80" y="-14" width="115" height="28" rx="14" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <text x="137" y="5" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" fill="#8b5cf6" font-weight="600">🎨 Web 控制面板</text>

    <!-- Skill Market -->
    <rect x="215" y="-14" width="105" height="28" rx="14" fill="#ec489920" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
    <text x="267" y="5" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="12" fill="#ec4899" font-weight="600">🧩 技能市场</text>
  </g>

  <!-- Subtitle -->
  <text x="400" y="215" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="14" fill="#6b7280">
    面向 Linux · macOS · Windows 的 OpenClaw 一键部署工具
  </text>

  <!-- Bottom decorative line -->
  <line x1="250" y1="238" x2="550" y2="238" stroke="#f9731630" stroke-width="1"/>
</svg>
