<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 -50 160 120" width="160" height="120">
  <!-- Body -->
  <ellipse cx="0" cy="0" rx="38" ry="28" fill="#ef4444" opacity="0.95"/>
  <ellipse cx="0" cy="5" rx="30" ry="18" fill="#f87171" opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="-12" cy="-14" r="10" fill="white"/>
  <circle cx="12" cy="-14" r="10" fill="white"/>
  <circle cx="-10" cy="-15" r="5.5" fill="#1e293b"/>
  <circle cx="14" cy="-15" r="5.5" fill="#1e293b"/>
  <circle cx="-9" cy="-16.5" r="2" fill="white"/>
  <circle cx="15" cy="-16.5" r="2" fill="white"/>

  <!-- Eye stalks -->
  <rect x="-15" y="-28" width="6" height="10" rx="3" fill="#dc2626"/>
  <rect x="9" y="-28" width="6" height="10" rx="3" fill="#dc2626"/>

  <!-- Smile -->
  <path d="M-12,0 Q0,14 12,0" fill="none" stroke="#991b1b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left claw -->
  <g transform="translate(-48, -8) rotate(-15)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ef4444"/>
    <path d="M10,-8 Q22,-16 18,-2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    <path d="M10,8 Q22,16 18,2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
  </g>

  <!-- Right claw -->
  <g transform="translate(48, -8) rotate(15)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ef4444"/>
    <path d="M-10,-8 Q-22,-16 -18,-2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
    <path d="M-10,8 Q-22,16 -18,2" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
  </g>

  <!-- Legs -->
  <line x1="-20" y1="20" x2="-32" y2="35" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="-8" y1="22" x2="-15" y2="38" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="15" y2="38" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="32" y2="35" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>

  <!-- Tail -->
  <path d="M0,26 Q-5,36 0,42 Q5,36 0,26" fill="#dc2626"/>
</svg>
