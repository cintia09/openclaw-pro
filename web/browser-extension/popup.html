<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:16px;background:#1a1a1d;color:#e6e6e6;font-size:13px}
h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#999;margin-bottom:3px}
.field input{width:100%;padding:6px 8px;background:#2a2a2d;border:1px solid #444;color:#e6e6e6;border-radius:4px;font-size:12px;outline:none}
.field input:focus{border-color:#58a6ff}
.status{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:8px;border-radius:6px;font-size:12px}
.status.disconnected{background:#2a1a1a;color:#f85149}
.status.connecting{background:#2a2a1a;color:#d29922}
.status.connected{background:#1a2a1a;color:#3fb950}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status.disconnected .dot{background:#f85149}
.status.connecting .dot{background:#d29922}
.status.connected .dot{background:#3fb950}
button{width:100%;padding:8px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-connect{background:#238636;color:#fff;margin-bottom:6px}
.btn-connect:hover{background:#2ea043}
.btn-connect:disabled{opacity:0.5;cursor:not-allowed}
.btn-disconnect{background:#da3633;color:#fff}
.btn-disconnect:hover{background:#e5534b}
.sep{height:1px;background:#333;margin:12px 0}
.hint{font-size:11px;color:#777;margin-top:8px;line-height:1.4}
</style>
</head>
<body>

<h2>🖥 OpenClaw Browser Bridge</h2>

<div id="status" class="status disconnected">
  <div class="dot"></div>
  <span id="status-text">未连接</span>
</div>

<div class="field">
  <label>OpenClaw 服务器地址</label>
  <input id="serverUrl" placeholder="http://192.168.1.100:3000" />
</div>

<div class="field">
  <label>配对码</label>
  <input id="pairCode" placeholder="在 Web 管理面板获取" />
</div>

<div class="field">
  <label>设备名称（可选）</label>
  <input id="deviceName" placeholder="如: 书房 Mac Mini" />
</div>

<button id="btn-connect" class="btn-connect">连接</button>
<button id="btn-disconnect" class="btn-disconnect" style="display:none">断开连接</button>

<div class="sep"></div>
<div class="hint">
  💡 在 OpenClaw Web 管理面板的「远端浏览器控制」页面获取配对码，填入上方即可建立连接。连接后 AI 代理可以控制本机浏览器。
</div>

<script src="popup.js"></script>
</body>
</html>
