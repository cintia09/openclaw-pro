name: Build & Release Docker Image

on:
  push:
    tags: ['v*']          # Only build on tag push (e.g. v1.0.0)
  workflow_dispatch:       # Also supports manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: menriothink/clawnook

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Write permission needed to upload Release
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build lite Docker image
      - name: Build lite Docker image
        run: docker build --build-arg BUILD_VERSION=${{ github.ref_name }} -f Dockerfile.lite -t clawnook:lite .

      # Push to GHCR (optional, for users with access)
      - name: Tag and push to GHCR
        run: |
          set -euo pipefail

          push_with_retry() {
            local image_ref="$1"
            local max_retry=4
            local attempt=1
            while [ "$attempt" -le "$max_retry" ]; do
              echo "[push] attempt ${attempt}/${max_retry}: ${image_ref}"
              if docker push "$image_ref"; then
                echo "[push] success: ${image_ref}"
                return 0
              fi
              if [ "$attempt" -lt "$max_retry" ]; then
                local wait_sec=$((attempt * 5))
                echo "[push] retry after ${wait_sec}s: ${image_ref}"
                sleep "$wait_sec"
              fi
              attempt=$((attempt + 1))
            done
            echo "[push] failed after ${max_retry} attempts: ${image_ref}" >&2
            return 1
          }

          docker tag clawnook:lite ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag clawnook:lite ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lite
          docker tag clawnook:lite ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-lite

          push_with_retry "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          push_with_retry "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lite"
          push_with_retry "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-lite"

      # Export image as tar.gz (direct download, no Docker Hub/GHCR needed)
      - name: Export images as tar.gz
        run: |
          docker save clawnook:lite | gzip > clawnook-image-lite.tar.gz
          ls -lh clawnook-image-lite.tar.gz
          sha256sum clawnook-image-lite.tar.gz > clawnook-image-lite.tar.gz.sha256

      # Upload to GitHub Release
      - name: Create Release and upload image
        uses: softprops/action-gh-release@v2
        with:
          name: ClawNook ${{ github.ref_name }}
          body: |
            ## ClawNook Docker Image

            ### Image Version
            - **Lite (sole release edition)** `clawnook-image-lite.tar.gz` (~250 MB)

            ### One-Click Install (Windows)
            ```powershell
            irm https://raw.githubusercontent.com/menriothink/clawnook/main/install-windows.ps1 | iex
            ```

            ### One-Click Install (Linux / macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/menriothink/clawnook/main/install.sh | bash
            ```

            ### Local Install (Offline / No Internet)

            Download **both** the source code (`Source code (tar.gz)`) and the Docker image (`clawnook-image-lite.tar.gz`) from this Release page, then:

            **Linux / macOS**
            ```bash
            tar xzf clawnook-*.tar.gz
            cp clawnook-image-lite.tar.gz clawnook-*/
            cd clawnook-*
            bash install-imageonly.sh
            ```

            **Windows (Administrator PowerShell)**
            ```powershell
            Expand-Archive clawnook-*.zip -DestinationPath .
            Copy-Item clawnook-image-lite.tar.gz -Destination clawnook-*\
            cd clawnook-*
            powershell -ExecutionPolicy Bypass -File install-windows.ps1
            ```

            > The install script auto-detects the local image and skips downloading.

            ---

            ## ClawNook Docker 镜像

            ### 镜像版本
            - **Lite（唯一发布版本）** `clawnook-image-lite.tar.gz` (~250MB)

            ### 一键安装 (Windows)
            ```powershell
            irm https://raw.githubusercontent.com/menriothink/clawnook/main/install-windows.ps1 | iex
            ```

            ### 一键安装 (Linux/macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/menriothink/clawnook/main/install.sh | bash
            ```

            ### 本地安装（离线 / 无网络）

            从本 Release 页面同时下载**源码包**（`Source code (tar.gz)`）和 **Docker 镜像**（`clawnook-image-lite.tar.gz`），然后：

            **Linux / macOS**
            ```bash
            tar xzf clawnook-*.tar.gz
            cp clawnook-image-lite.tar.gz clawnook-*/
            cd clawnook-*
            bash install-imageonly.sh
            ```

            **Windows（管理员 PowerShell）**
            ```powershell
            Expand-Archive clawnook-*.zip -DestinationPath .
            Copy-Item clawnook-image-lite.tar.gz -Destination clawnook-*\
            cd clawnook-*
            powershell -ExecutionPolicy Bypass -File install-windows.ps1
            ```

            > 安装脚本会自动检测本地镜像文件，跳过下载步骤。
          files: |
            clawnook-image-lite.tar.gz
            clawnook-image-lite.tar.gz.sha256
